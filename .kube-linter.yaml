checks:
  # Only enforce checks that directly affect runtime correctness.
  # - Resource limits/requests: required for HPA to function and for scheduler bin-packing.
  # - Probes: required for traffic routing and self-healing to work correctly.
  include:
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    - "no-liveness-probe"
    - "no-readiness-probe"
