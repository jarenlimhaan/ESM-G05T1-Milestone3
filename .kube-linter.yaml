checks:
  addAllBuiltIn: true
  # Run all built-in checks, then exclude false positives for this project.
  exclude:
    # Odoo, Moodle, osTicket legitimately run as root
    - "run-as-non-root"
    # All three apps write to disk — read-only root fs would break them
    - "no-read-only-root-fs"
    # __PLACEHOLDER__ images are substituted at deploy time, not a real tag problem
    - "latest-tag"
    # Gateway replicas=2 on a small cluster — anti-affinity not required
    - "no-anti-affinity"
