apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: esm-enterprise
  namespace: argocd          # ArgoCD always manages Application objects in its own namespace
spec:
  project: default

  source:
    repoURL: https://github.com/jarenlimhaan/ESM-G05T1-Milestone3
    targetRevision: fix/secrets   # TODO: revert to main after PR #3 is merged
    path: k8s-rendered        # rendered folder with no placeholders

  destination:
    server: https://kubernetes.default.svc   # "this cluster" (in-cluster)
    namespace: default        # ArgoCD will honour per-resource namespaces from the manifests

  ignoreDifferences:
    - group: ""
      kind: PersistentVolume
      jsonPointers:
        - /spec/claimRef          # Kubernetes auto-populates this when PV is bound
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas          # HPA owns this field when active — ignore drift

  syncPolicy:
    automated:
      prune: true       # delete resources removed from Git
      selfHeal: true    # revert manual kubectl changes back to Git state
    syncOptions:
      - CreateNamespace=true  # create namespaces if they don't exist yet
