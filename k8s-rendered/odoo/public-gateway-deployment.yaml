apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-public-gateway
  namespace: odoo-public
spec:
  replicas: 2
  selector:
    matchLabels:
      app: odoo-public-gateway
  template:
    metadata:
      labels:
        app: odoo-public-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: odoo-public-nginx-config
