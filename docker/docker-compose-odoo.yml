services:
  db:
    image: postgres:15
    container_name: odoo17-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo17
      POSTGRES_PASSWORD: odoo17
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
      - ./odoo_backup.sql.gz:/docker-entrypoint-initdb.d/00-odoo.sql.gz:ro
      - ./docker/odoo/reset-password.sh:/docker-entrypoint-initdb.d/01-reset-password.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo17} -d ${ODOO_DB_NAME:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo:
    image: odoo:17
    container_name: odoo17-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_HTTP_PORT:-8069}:8069"
      - "${ODOO_LONGPOLLING_PORT:-8072}:8072"
    volumes:
      - ./docker/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./external_addons/helpdesk:/mnt/extra-addons:ro
      - ./filestore:/var/lib/odoo/filestore
      - odoo-data:/var/lib/odoo

volumes:
  odoo-db-data:
  odoo-data:
