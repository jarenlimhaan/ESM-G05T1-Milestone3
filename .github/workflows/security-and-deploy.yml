name: Security And Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "k8s/**"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov (Terraform + Kubernetes)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,kubernetes
          quiet: true
          soft_fail: true

  snyk_iac:
    name: Snyk IaC Scan
    runs-on: ubuntu-latest
    needs: checkov
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Snyk IaC (Terraform)
        uses: snyk/actions/iac@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high terraform

      - name: Run Snyk IaC (Kubernetes)
        uses: snyk/actions/iac@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high k8s

  deploy:
    name: Deploy (Scripted)
    runs-on: ubuntu-latest
    needs: snyk_iac
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-1' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Ensure script execute bit
        run: chmod +x scripts/*.sh

      - name: Configure Terraform backend (optional remote state)
        shell: bash
        run: |
          if [[ -n "${TF_STATE_BUCKET}" ]]; then
            KEY="${TF_STATE_KEY:-esm/prod/terraform.tfstate}"
            cat > terraform/backend.hcl <<EOF
bucket         = "${TF_STATE_BUCKET}"
key            = "${KEY}"
region         = "${AWS_REGION}"
encrypt        = true
EOF
            if [[ -n "${TF_STATE_LOCK_TABLE}" ]]; then
              echo "dynamodb_table = \"${TF_STATE_LOCK_TABLE}\"" >> terraform/backend.hcl
            fi
            echo "Terraform backend.hcl created for remote state."
          else
            echo "TF_STATE_BUCKET not set. Using local state mode in CI runner."
          fi

      - name: Deploy or rebuild
        shell: bash
        run: |
          REGION="${AWS_REGION:-ap-southeast-1}"
          ./scripts/deploy-or-rebuild.sh --skip-image-push --aws-region "${REGION}"
