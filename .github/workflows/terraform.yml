name: ArgoCD Deploy (No Terraform Apply)

on:
  push:
    branches: [main]
    paths:
      - "k8s-rendered/**"
      - "argocd/**"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-1' }}

jobs:
  argocd_apply:
    name: Apply ArgoCD Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure rendered manifests exist
        run: |
          if [ ! -d "k8s-rendered" ]; then
            echo "k8s-rendered directory is missing. Commit rendered manifests before ArgoCD deploy."
            exit 1
          fi

      - name: Select AWS auth mode
        id: aws_auth
        shell: bash
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "${AWS_ROLE_TO_ASSUME}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No AWS auth configured. Set AWS_ROLE_TO_ASSUME or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.aws_auth.outputs.mode == 'oidc' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Keys Fallback)
        if: ${{ steps.aws_auth.outputs.mode == 'keys' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform (read outputs only)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Terraform Init (for outputs)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Update kubeconfig from Terraform output
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          CLUSTER_NAME="$(terraform output -raw eks_cluster_name)"
          REGION="$(terraform output -raw aws_region)"
          aws eks update-kubeconfig --name "${CLUSTER_NAME}" --region "${REGION}"

      - name: Install/Upgrade ArgoCD (idempotent)
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

      - name: Apply ArgoCD Application
        run: kubectl apply -f argocd/application.yaml

      - name: Verify ArgoCD Application exists
        run: kubectl get applications.argoproj.io -n argocd
