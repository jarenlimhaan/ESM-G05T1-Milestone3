name: Destroy Infrastructure (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to continue"
        required: true
        type: string

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-1' }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate confirmation
        shell: bash
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "Confirmation failed. You must type DESTROY."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select AWS auth mode
        id: aws_auth
        shell: bash
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "${AWS_ROLE_TO_ASSUME}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No AWS auth configured. Set AWS_ROLE_TO_ASSUME or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.aws_auth.outputs.mode == 'oidc' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Keys Fallback)
        if: ${{ steps.aws_auth.outputs.mode == 'keys' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform destroy -auto-approve -input=false \
            -var="odoo_db_password=${{ secrets.ODOO_DB_PASSWORD }}" \
            -var="moodle_db_password=${{ secrets.MOODLE_DB_PASSWORD }}" \
            -var="osticket_db_password=${{ secrets.OSTICKET_DB_PASSWORD }}" \
            -var="osticket_install_secret=${{ secrets.OSTICKET_INSTALL_SECRET }}" \
            -var="osticket_admin_password=${{ secrets.OSTICKET_ADMIN_PASSWORD }}"
