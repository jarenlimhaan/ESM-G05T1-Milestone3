services:
  db:
    image: postgres:15
    container_name: odoo17-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ODOO_DB_NAME:-odoo}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo17}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo17}
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
      - ./odoo17/odoo.sql.gz:/docker-entrypoint-initdb.d/00-odoo.sql.gz:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo17} -d ${ODOO_DB_NAME:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo:
    image: odoo:17
    container_name: odoo17-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_HTTP_PORT:-8069}:8069"
      - "${ODOO_LONGPOLLING_PORT:-8072}:8072"
    command: ["python3", "/mnt/odoo-src/odoo-bin", "-c", "/etc/odoo/odoo.conf"]
    volumes:
      - ./docker/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./odoo17:/mnt/odoo-src:ro
      - ./external_addons/helpdesk:/mnt/oca-helpdesk:ro
      - ./filestore:/var/lib/odoo/filestore

volumes:
  odoo-db-data:
