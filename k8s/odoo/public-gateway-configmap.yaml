apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-public-nginx-config
  namespace: esm
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      # Keep Odoo backend/admin private by denying /web paths on public LB.
      location ^~ /web {
        return 403;
      }

      location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_pass http://odoo-public-backend.esm.svc.cluster.local;
      }
    }
