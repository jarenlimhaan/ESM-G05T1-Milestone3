apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-public
  namespace: odoo-public
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: odoo-public
  template:
    metadata:
      labels:
        app: odoo-public
    spec:
      containers:
        - name: odoo
          image: __ODOO_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - "--database=__ODOO_DB_NAME__"
            - "--db-filter=^__ODOO_DB_NAME__$"
            - "--proxy-mode"
          ports:
            - containerPort: 8069
          env:
            - name: HOST
              value: "__ODOO_DB_HOST__"
            - name: PORT
              value: "5432"
            - name: USER
              value: "__ODOO_DB_USER__"
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db
                  key: password
            - name: PGSSLMODE
              value: require
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-public-pvc
