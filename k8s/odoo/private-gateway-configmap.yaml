apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-private-nginx-config
  namespace: odoo-private
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      absolute_redirect off;
      port_in_redirect off;

      # Allow only database manager endpoint internally.
      location ^~ /odoo/web/database/manager {
        rewrite ^/odoo/?(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_pass http://odoo-private-backend.odoo-private.svc.cluster.local;
      }

      location ^~ /odoo/web/database {
        return 403;
      }

      location = /odoo {
        return 301 /;
      }

      location ^~ /odoo/ {
        rewrite ^/odoo/?(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_pass http://odoo-private-backend.odoo-private.svc.cluster.local;
      }

      location = /web {
        return 301 /web/;
      }

      location ^~ /web/database/manager {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_pass http://odoo-private-backend.odoo-private.svc.cluster.local;
      }

      location ^~ /web/database {
        return 403;
      }

      location ^~ /web/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_pass http://odoo-private-backend.odoo-private.svc.cluster.local;
      }

      location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_pass http://odoo-private-backend.odoo-private.svc.cluster.local;
      }
    }
