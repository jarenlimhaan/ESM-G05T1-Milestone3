apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
  namespace: moodle-private
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
        - name: moodle
          image: __MOODLE_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: MOODLE_DB_TYPE
              value: mariadb
            - name: MOODLE_DB_HOST
              value: "__MOODLE_DB_HOST__"
            - name: MOODLE_DB_PORT
              value: "3306"
            - name: MOODLE_DB_USER
              value: "__MOODLE_DB_USER__"
            - name: MOODLE_DB_NAME
              value: "__MOODLE_DB_NAME__"
            - name: MOODLE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: moodle-db
                  key: password
            - name: MOODLE_ADMIN
              value: "__MOODLE_ADMIN_USER__"
            - name: MOODLE_ADMIN_PASSWORD
              value: "__MOODLE_ADMIN_PASSWORD__"
            - name: MOODLE_ADMIN_EMAIL
              value: "__MOODLE_ADMIN_EMAIL__"
            - name: MOODLE_URL
              value: "__MOODLE_URL__"
          volumeMounts:
            - name: moodle-web
              mountPath: /var/www/html
            - name: moodle-data
              mountPath: /var/moodledata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: moodle-web
          emptyDir: {}
        - name: moodle-data
          emptyDir: {}
