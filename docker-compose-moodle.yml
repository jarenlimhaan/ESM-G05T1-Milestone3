# Moodle LMS — local development / testing
# Uses ellakcy/moodle image (bitnami images removed from Docker Hub)
# Moodle is config-only for this project — no code changes required

services:
  moodle-db:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle
      MYSQL_ROOT_PASSWORD: moodleroot
    volumes:
      - moodle-db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-pmoodleroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  moodle:
    image: ellakcy/moodle:mysql_maria_apache_latest
    depends_on:
      moodle-db:
        condition: service_healthy
    environment:
      MOODLE_URL: http://localhost:8080
      MOODLE_DB_HOST: moodle-db
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: moodle
      MOODLE_DB_TYPE: mariadb
      MOODLE_ADMIN: admin
      MOODLE_ADMIN_PASSWORD: Admin~1234
      MOODLE_ADMIN_EMAIL: admin@esmos.meals.sg
    ports:
      - "8080:80"
    volumes:
      - moodle-data:/var/www/html
      - moodledata:/var/moodledata

volumes:
  moodle-db-data:
  moodle-data:
  moodledata: